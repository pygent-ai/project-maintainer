interface:
  display_name: "Project Maintainer"
  short_description: "Project maps with source coverage and audits."
  default_prompt: "Use $project-maintainer in Knowledge Base Delivery Mode when the user wants `.doc_project_maintainer/` analyzed, built, updated, audited, summarized, or made current. Use Maintenance-Aware Fix Mode when the user asks to use Project Maintainer during a bug fix, feature change, or refactor: check whether `.doc_project_maintainer/` exists, read relevant slices if available, ask the user whether to analyze first if missing or uncovered, keep debugging/TDD as the primary repair workflow, then synchronize affected artifact slices after verification because artifact maintenance becomes part of the task completion criteria. For a single symbol audit, read code and evidence before recording health. For a multiple symbol audit, use one audit agent per required symbol; each assignment stays pending until that agent's recent call signature promotes the symbol to agent_audited. Scripts may only inventory, queue, validate, or record reviewed results and must not bulk-generate health. Keep non-closure-eligible audits partial until trusted verification or out-of-scope disposition. When a human-readable audit dashboard is requested, use scripts/render_audit_report.py to generate project/audit-report.html; if you refresh inventory, coverage maps, symbol audit maps, or audit integrity reports after report generation, tell the user the HTML reflects older data and should be regenerated."
