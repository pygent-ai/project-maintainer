interface:
  display_name: "Project Maintainer"
  short_description: "Project maps with source coverage and audits."
  default_prompt: "Use $project-maintainer to initialize or update the structured project-maintenance docs for this repository. For a complete deliverable or full repository analysis, run scripts/inventory_symbols.py to generate source-symbol-inventory.json, coverage-map.json, and symbol-audit-map.json; review directory_summary to see recorded, excluded, and skipped directories; document every stable source file, every top-level class, every top-level function, and every class method with Actual Role plus health; use source_role and audit_scope to keep full repository coverage separate from default runtime/library health audit; use suggested_slices for repository coverage and suggested_audit_slices plus health_audit_summary for product health work; and keep pending, stale, heuristic, requires_review, unaudited, or audit_expired results partial until reviewed in the requested scope."
