interface:
  display_name: "Project Maintainer"
  short_description: "Project maps with source coverage and audits."
  default_prompt: "Use $project-maintainer to initialize or update the structured project-maintenance docs for this repository. For a complete deliverable or full repository analysis, run scripts/inventory_symbols.py to generate source-symbol-inventory.json, coverage-map.json, and symbol-audit-map.json; document every stable source file, every top-level function, and every class method with Actual Role plus health; audit every top-level class, top-level function, and class method as agent_audited, human_audited, audit_expired, unaudited, or out_of_scope; record health snapshots and concrete issues; use coverage-map suggested_slices for large projects; and keep pending, stale, heuristic, requires_review, unaudited, or audit_expired results partial until reviewed."
